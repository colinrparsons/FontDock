{% extends "base.html" %}

{% block title %}Change Password - FontDock{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 50px;">
    <h2>Change Password</h2>
    
    <div id="message" class="alert" style="display: none;"></div>
    
    <form id="passwordForm" style="margin-top: 30px;">
        <div class="form-group">
            <label for="current_password">Current Password</label>
            <input type="password" class="form-control" id="current_password" required>
        </div>
        
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" class="form-control" id="new_password" required minlength="6" maxlength="72">
            <small class="form-text text-muted">Must be 6-72 characters</small>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Change Password</button>
        <a href="/ui/dashboard" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script>
document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const currentPassword = document.getElementById('current_password').value;
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    const messageDiv = document.getElementById('message');
    
    try {
        const response = await fetch('/change-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            body: JSON.stringify({
                current_password: currentPassword,
                new_password: newPassword,
                confirm_password: confirmPassword
            })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            messageDiv.className = 'alert alert-success';
            messageDiv.textContent = 'Password changed successfully! Redirecting...';
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = '/ui/dashboard';
            }, 2000);
        } else {
            messageDiv.className = 'alert alert-danger';
            messageDiv.textContent = data.detail || 'Error changing password';
            messageDiv.style.display = 'block';
        }
    } catch (error) {
        messageDiv.className = 'alert alert-danger';
        messageDiv.textContent = 'Error: ' + error.message;
        messageDiv.style.display = 'block';
    }
});
</script>
{% endblock %}
